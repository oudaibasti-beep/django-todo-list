<!DOCTYPE html>
<html>
<head>
    <title>Ma Super Todo List</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #e9ecef; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; width: 400px; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #343a40; margin-bottom: 25px; }
        form { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border: 2px solid #dee2e6; border-radius: 8px; outline: none; }
        input:focus { border-color: #007bff; }
        button.add-btn { padding: 10px 20px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        ul { list-style: none; padding: 0; }
        li { background: #f8f9fa; margin-bottom: 10px; padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #007bff; }
        .delete-btn { color: #dc3545; text-decoration: none; font-weight: bold; padding: 5px 10px; border-radius: 5px; }
        .delete-btn:hover { background: #ffebeb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Mes Tâches</h1>
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="title" placeholder="Ajouter une tâche..." required>
            <button type="submit" class="add-btn">Ajouter</button>
        </form>
        <ul>
            {% for task in tasks %}
            <li>
                {{ task.title }}
                <a href="{% url 'delete_task' task.id %}" class="delete-btn">✕</a>
            </li>
            {% empty %}
            <p style="text-align: center; color: #6c757d;">Aucune tâche. Profite de ton temps libre ! ☕</p>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
